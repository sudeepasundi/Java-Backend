<svg xmlns="http://www.w3.org/2000/svg" width="940" height="280" viewBox="0 0 940 280" role="img" aria-labelledby="title desc">
  <title id="title">SQL transaction flow</title>
  <desc id="desc">Flowchart showing begin transaction, debit, credit, success commit, and failure rollback.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.decision{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.good{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:10}.bad{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:14px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:12px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="30" y="105" width="110" height="60" class="good"/><text x="85" y="141" text-anchor="middle" class="text">BEGIN</text>
  <path d="M140 135 H190" class="line"/><rect x="195" y="105" width="120" height="60" class="box"/><text x="255" y="130" text-anchor="middle" class="text">Debit</text><text x="255" y="148" text-anchor="middle" class="small">account A</text>
  <path d="M315 135 H365" class="line"/><rect x="370" y="105" width="120" height="60" class="box"/><text x="430" y="130" text-anchor="middle" class="text">Credit</text><text x="430" y="148" text-anchor="middle" class="small">account B</text>
  <path d="M490 135 H540" class="line"/><polygon points="620,85 730,135 620,185 510,135" class="decision"/><text x="620" y="131" text-anchor="middle" class="text">All OK?</text>
  <path d="M730 135 H795" class="line"/><rect x="800" y="105" width="105" height="60" class="good"/><text x="852" y="141" text-anchor="middle" class="text">COMMIT</text>
  <path d="M620 185 V230 H800" class="line"/><rect x="800" y="210" width="105" height="55" class="bad"/><text x="852" y="243" text-anchor="middle" class="text">ROLLBACK</text>
</svg>

