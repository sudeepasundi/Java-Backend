<svg xmlns="http://www.w3.org/2000/svg" width="920" height="250" viewBox="0 0 920 250" role="img" aria-labelledby="title desc">
  <title id="title">Repository proxy flow</title>
  <desc id="desc">Flowchart showing repository interface implemented by Spring Data proxy and calling JPA EntityManager database.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.accent{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:14px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:12px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="35" y="95" width="145" height="65" class="box"/><text x="107" y="122" text-anchor="middle" class="text">TaskRepository</text><text x="107" y="143" text-anchor="middle" class="small">interface</text>
  <path d="M180 128 H255" class="line"/><rect x="260" y="95" width="150" height="65" class="accent"/><text x="335" y="122" text-anchor="middle" class="text">Spring Data Proxy</text><text x="335" y="143" text-anchor="middle" class="small">runtime implementation</text>
  <path d="M410 128 H485" class="line"/><rect x="490" y="95" width="145" height="65" class="box"/><text x="562" y="122" text-anchor="middle" class="text">EntityManager</text><text x="562" y="143" text-anchor="middle" class="small">JPA</text>
  <path d="M635 128 H710" class="line"/><rect x="715" y="95" width="155" height="65" class="accent"/><text x="792" y="122" text-anchor="middle" class="text">SQL Database</text><text x="792" y="143" text-anchor="middle" class="small">tables</text>
</svg>

