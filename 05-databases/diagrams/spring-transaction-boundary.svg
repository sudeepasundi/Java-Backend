<svg xmlns="http://www.w3.org/2000/svg" width="940" height="280" viewBox="0 0 940 280" role="img" aria-labelledby="title desc">
  <title id="title">Spring transaction boundary flow</title>
  <desc id="desc">Flowchart showing transactional service method starts transaction, repository calls run, then commit or rollback.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.decision{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.good{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:10}.bad{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:14px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:12px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="35" y="105" width="130" height="60" class="good"/><text x="100" y="130" text-anchor="middle" class="text">@Transactional</text><text x="100" y="148" text-anchor="middle" class="small">start</text>
  <path d="M165 135 H235" class="line"/><rect x="240" y="105" width="140" height="60" class="box"/><text x="310" y="130" text-anchor="middle" class="text">Service Logic</text><text x="310" y="148" text-anchor="middle" class="small">business rules</text>
  <path d="M380 135 H450" class="line"/><rect x="455" y="105" width="135" height="60" class="box"/><text x="522" y="130" text-anchor="middle" class="text">Repository</text><text x="522" y="148" text-anchor="middle" class="small">save/query</text>
  <path d="M590 135 H660" class="line"/><polygon points="735,85 835,135 735,185 635,135" class="decision"/><text x="735" y="131" text-anchor="middle" class="text">Exception?</text>
  <path d="M835 135 H890" class="line"/><text x="900" y="140" class="small">rollback</text>
  <path d="M735 185 V230 H835" class="line"/><rect x="835" y="210" width="85" height="50" class="good"/><text x="877" y="240" text-anchor="middle" class="text">commit</text>
</svg>

