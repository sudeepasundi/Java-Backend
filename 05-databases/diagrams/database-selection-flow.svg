<svg xmlns="http://www.w3.org/2000/svg" width="960" height="390" viewBox="0 0 960 390" role="img" aria-labelledby="title desc">
  <title id="title">Database selection flow</title>
  <desc id="desc">Decision flowchart for choosing SQL, MongoDB, or Cassandra based on relationships, document shape, and write scale.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.decision{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.answer{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:10}.warn{fill:#fef3c7;stroke:#b45309;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:13px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:11px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="365" y="20" width="230" height="55" class="box"/><text x="480" y="53" text-anchor="middle" class="text">Choose database</text>
  <path d="M480 75 V110" class="line"/><polygon points="480,110 630,165 480,220 330,165" class="decision"/><text x="480" y="161" text-anchor="middle" class="text">Strong relationships/transactions?</text>
  <path d="M330 165 H180" class="line"/><rect x="45" y="135" width="130" height="60" class="answer"/><text x="110" y="160" text-anchor="middle" class="text">SQL</text><text x="110" y="181" text-anchor="middle" class="small">default choice</text>
  <path d="M630 165 H780" class="line"/><polygon points="840,115 935,165 840,215 745,165" class="decision"/><text x="840" y="161" text-anchor="middle" class="text">Huge write scale?</text>
  <path d="M840 215 V275" class="line"/><rect x="775" y="280" width="130" height="60" class="warn"/><text x="840" y="305" text-anchor="middle" class="text">Cassandra</text><text x="840" y="326" text-anchor="middle" class="small">query-first</text>
  <path d="M745 165 H620 V300 H455" class="line"/><rect x="320" y="270" width="130" height="60" class="warn"/><text x="385" y="295" text-anchor="middle" class="text">MongoDB</text><text x="385" y="316" text-anchor="middle" class="small">document-shaped</text>
</svg>
