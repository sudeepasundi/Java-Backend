<svg xmlns="http://www.w3.org/2000/svg" width="920" height="260" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">Persistence layer flow</title>
  <desc id="desc">Flowchart showing controller to service to repository to database and response mapping.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.accent{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:14px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:12px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="35" y="95" width="125" height="65" class="accent"/><text x="97" y="122" text-anchor="middle" class="text">Controller</text><text x="97" y="143" text-anchor="middle" class="small">HTTP</text>
  <path d="M160 128 H230" class="line"/><rect x="235" y="95" width="125" height="65" class="box"/><text x="297" y="122" text-anchor="middle" class="text">Service</text><text x="297" y="143" text-anchor="middle" class="small">business + tx</text>
  <path d="M360 128 H430" class="line"/><rect x="435" y="95" width="125" height="65" class="box"/><text x="497" y="122" text-anchor="middle" class="text">Repository</text><text x="497" y="143" text-anchor="middle" class="small">persistence</text>
  <path d="M560 128 H630" class="line"/><rect x="635" y="95" width="110" height="65" class="accent"/><text x="690" y="122" text-anchor="middle" class="text">Database</text>
  <path d="M745 128 H815" class="line"/><rect x="820" y="95" width="70" height="65" class="box"/><text x="855" y="122" text-anchor="middle" class="text">DTO</text>
</svg>

