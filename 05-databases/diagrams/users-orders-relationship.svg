<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" role="img" aria-labelledby="title desc">
  <title id="title">Users orders relationship</title>
  <desc id="desc">Entity relationship style diagram showing one user has many orders.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.table{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.head{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:15px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:12px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="120" y="65" width="220" height="155" class="table"/><rect x="120" y="65" width="220" height="45" class="head"/><text x="230" y="93" text-anchor="middle" class="text">users</text><text x="150" y="135" class="small">PK id</text><text x="150" y="160" class="small">name</text><text x="150" y="185" class="small">email</text>
  <rect x="560" y="65" width="220" height="155" class="table"/><rect x="560" y="65" width="220" height="45" class="head"/><text x="670" y="93" text-anchor="middle" class="text">orders</text><text x="590" y="135" class="small">PK id</text><text x="590" y="160" class="small">FK user_id</text><text x="590" y="185" class="small">status</text>
  <path d="M340 150 H560" class="line"/><text x="450" y="135" text-anchor="middle" class="small">one user has many orders</text>
</svg>

