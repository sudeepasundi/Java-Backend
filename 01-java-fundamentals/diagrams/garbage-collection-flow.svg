<svg xmlns="http://www.w3.org/2000/svg" width="920" height="250" viewBox="0 0 920 250" role="img" aria-labelledby="title desc">
  <title id="title">Garbage collection flow</title>
  <desc id="desc">Flowchart showing object creation, reachability check, and memory reclamation.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.decision{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.done{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:15px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:12px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="35" y="95" width="150" height="60" class="box"/><text x="110" y="121" text-anchor="middle" class="text">Object created</text><text x="110" y="142" text-anchor="middle" class="small">new User()</text>
  <path d="M185 125 H260" class="line"/><rect x="265" y="95" width="150" height="60" class="box"/><text x="340" y="121" text-anchor="middle" class="text">Object used</text><text x="340" y="142" text-anchor="middle" class="small">reachable</text>
  <path d="M415 125 H490" class="line"/><polygon points="570,70 680,125 570,180 460,125" class="decision"/><text x="570" y="121" text-anchor="middle" class="text">Still reachable?</text>
  <path d="M680 125 H755" class="line"/><rect x="760" y="95" width="130" height="60" class="done"/><text x="825" y="121" text-anchor="middle" class="text">Keep object</text><text x="825" y="142" text-anchor="middle" class="small">not collected</text>
  <path d="M570 180 V220 H245 V155" class="line"/><text x="405" y="238" text-anchor="middle" class="small">If no, eligible for GC and memory can be reclaimed</text>
</svg>
