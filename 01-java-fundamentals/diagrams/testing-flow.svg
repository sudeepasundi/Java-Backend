<svg xmlns="http://www.w3.org/2000/svg" width="820" height="240" viewBox="0 0 820 240" role="img" aria-labelledby="title desc">
  <title id="title">Testing flow</title>
  <desc id="desc">Flowchart showing arrange, act, assert, and refactor testing cycle.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.accent{fill:#e0f2fe;stroke:#0369a1;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:16px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:12px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="35" y="80" width="140" height="75" class="accent"/><text x="105" y="111" text-anchor="middle" class="text">Arrange</text><text x="105" y="134" text-anchor="middle" class="small">prepare inputs</text>
  <path d="M175 118 H245" class="line"/><rect x="250" y="80" width="140" height="75" class="box"/><text x="320" y="111" text-anchor="middle" class="text">Act</text><text x="320" y="134" text-anchor="middle" class="small">call method</text>
  <path d="M390 118 H460" class="line"/><rect x="465" y="80" width="140" height="75" class="box"/><text x="535" y="111" text-anchor="middle" class="text">Assert</text><text x="535" y="134" text-anchor="middle" class="small">verify result</text>
  <path d="M605 118 H675" class="line"/><rect x="680" y="80" width="110" height="75" class="accent"/><text x="735" y="111" text-anchor="middle" class="text">Refactor</text><text x="735" y="134" text-anchor="middle" class="small">keep tests green</text>
</svg>

