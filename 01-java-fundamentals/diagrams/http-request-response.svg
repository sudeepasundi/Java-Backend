<svg xmlns="http://www.w3.org/2000/svg" width="880" height="230" viewBox="0 0 880 230" role="img" aria-labelledby="title desc">
  <title id="title">HTTP request response flow</title>
  <desc id="desc">Flowchart showing client request to server and server response back to client.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.accent{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:16px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:13px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="55" y="75" width="160" height="80" class="accent"/><text x="135" y="107" text-anchor="middle" class="text">Client</text><text x="135" y="132" text-anchor="middle" class="small">browser/app</text>
  <path d="M215 95 H655" class="line"/><text x="435" y="82" text-anchor="middle" class="small">HTTP request</text>
  <rect x="665" y="75" width="160" height="80" class="accent"/><text x="745" y="107" text-anchor="middle" class="text">Server</text><text x="745" y="132" text-anchor="middle" class="small">Java backend</text>
  <path d="M665 135 H225" class="line"/><text x="445" y="163" text-anchor="middle" class="small">HTTP response</text>
</svg>

