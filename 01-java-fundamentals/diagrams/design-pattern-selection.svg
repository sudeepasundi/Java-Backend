<svg xmlns="http://www.w3.org/2000/svg" width="940" height="390" viewBox="0 0 940 390" role="img" aria-labelledby="title desc">
  <title id="title">Design pattern selection flow</title>
  <desc id="desc">Flowchart for choosing strategy, factory, or singleton pattern.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.decision{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.answer{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:15px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:12px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="370" y="20" width="200" height="58" class="box"/><text x="470" y="55" text-anchor="middle" class="text">Design problem</text>
  <path d="M470 78 V115" class="line"/>
  <polygon points="470,115 620,175 470,235 320,175" class="decision"/><text x="470" y="171" text-anchor="middle" class="text">Replace algorithm?</text><text x="470" y="192" text-anchor="middle" class="small">discount, payment rule</text>
  <path d="M320 175 H160" class="line"/><rect x="35" y="145" width="120" height="60" class="answer"/><text x="95" y="181" text-anchor="middle" class="text">Strategy</text>
  <path d="M470 235 V270" class="line"/>
  <polygon points="470,270 610,325 470,380 330,325" class="decision"/><text x="470" y="321" text-anchor="middle" class="text">Creation varies?</text><text x="470" y="342" text-anchor="middle" class="small">type decides object</text>
  <path d="M610 325 H765" class="line"/><rect x="770" y="295" width="130" height="60" class="answer"/><text x="835" y="331" text-anchor="middle" class="text">Factory</text>
  <path d="M620 175 H765" class="line"/><rect x="770" y="145" width="130" height="60" class="answer"/><text x="835" y="171" text-anchor="middle" class="text">Singleton?</text><text x="835" y="192" text-anchor="middle" class="small">rare in Spring</text>
</svg>

