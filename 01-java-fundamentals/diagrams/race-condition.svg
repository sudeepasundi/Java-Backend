<svg xmlns="http://www.w3.org/2000/svg" width="900" height="330" viewBox="0 0 900 330" role="img" aria-labelledby="title desc">
  <title id="title">Race condition flow</title>
  <desc id="desc">Diagram showing two threads reading the same counter value and overwriting each other.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.warn{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:10}.ok{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:15px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:12px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="370" y="20" width="160" height="55" class="box"/><text x="450" y="54" text-anchor="middle" class="text">count = 0</text>
  <path d="M450 75 C330 100 260 115 190 140" class="line"/><path d="M450 75 C570 100 640 115 710 140" class="line"/>
  <rect x="80" y="140" width="220" height="70" class="warn"/><text x="190" y="168" text-anchor="middle" class="text">Thread A reads 0</text><text x="190" y="190" text-anchor="middle" class="small">calculates 1</text>
  <rect x="600" y="140" width="220" height="70" class="warn"/><text x="710" y="168" text-anchor="middle" class="text">Thread B reads 0</text><text x="710" y="190" text-anchor="middle" class="small">calculates 1</text>
  <path d="M190 210 C260 250 335 265 450 275" class="line"/><path d="M710 210 C640 250 565 265 450 275" class="line"/>
  <rect x="350" y="255" width="200" height="55" class="warn"/><text x="450" y="288" text-anchor="middle" class="text">Final count = 1, not 2</text>
</svg>

