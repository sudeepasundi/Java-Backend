<svg xmlns="http://www.w3.org/2000/svg" width="980" height="250" viewBox="0 0 980 250" role="img" aria-labelledby="title desc">
  <title id="title">Servlet request flow</title>
  <desc id="desc">Flowchart showing browser request through web server, servlet container, servlet, service, and database.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.accent{fill:#fef3c7;stroke:#b45309;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:14px;fill:#0f172a}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="20" y="95" width="115" height="60" class="box"/><text x="77" y="131" text-anchor="middle" class="text">Client</text>
  <path d="M135 125 H180" class="line"/><rect x="185" y="95" width="130" height="60" class="box"/><text x="250" y="131" text-anchor="middle" class="text">Web Server</text>
  <path d="M315 125 H360" class="line"/><rect x="365" y="95" width="155" height="60" class="accent"/><text x="442" y="131" text-anchor="middle" class="text">Servlet Container</text>
  <path d="M520 125 H565" class="line"/><rect x="570" y="95" width="115" height="60" class="box"/><text x="627" y="131" text-anchor="middle" class="text">Servlet</text>
  <path d="M685 125 H730" class="line"/><rect x="735" y="95" width="100" height="60" class="box"/><text x="785" y="131" text-anchor="middle" class="text">Service</text>
  <path d="M835 125 H880" class="line"/><rect x="885" y="95" width="80" height="60" class="box"/><text x="925" y="131" text-anchor="middle" class="text">DB</text>
</svg>

