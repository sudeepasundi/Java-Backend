<svg xmlns="http://www.w3.org/2000/svg" width="920" height="230" viewBox="0 0 920 230" role="img" aria-labelledby="title desc">
  <title id="title">Build tool flow</title>
  <desc id="desc">Flowchart showing source code through dependency download, compile, test, package, and artifact creation.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.accent{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:14px;fill:#0f172a}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="20" y="85" width="110" height="60" class="box"/><text x="75" y="121" text-anchor="middle" class="text">Source</text>
  <path d="M130 115 H175" class="line"/><rect x="180" y="85" width="130" height="60" class="box"/><text x="245" y="121" text-anchor="middle" class="text">Dependencies</text>
  <path d="M310 115 H355" class="line"/><rect x="360" y="85" width="110" height="60" class="box"/><text x="415" y="121" text-anchor="middle" class="text">Compile</text>
  <path d="M470 115 H515" class="line"/><rect x="520" y="85" width="110" height="60" class="box"/><text x="575" y="121" text-anchor="middle" class="text">Test</text>
  <path d="M630 115 H675" class="line"/><rect x="680" y="85" width="110" height="60" class="box"/><text x="735" y="121" text-anchor="middle" class="text">Package</text>
  <path d="M790 115 H835" class="line"/><rect x="840" y="85" width="70" height="60" class="accent"/><text x="875" y="121" text-anchor="middle" class="text">JAR</text>
</svg>

