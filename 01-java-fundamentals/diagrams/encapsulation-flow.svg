<svg xmlns="http://www.w3.org/2000/svg" width="880" height="260" viewBox="0 0 880 260" role="img" aria-labelledby="title desc">
  <title id="title">Encapsulation flow</title>
  <desc id="desc">Flowchart showing callers using methods instead of directly changing private state.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <style>
      .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}
      .good{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:10}
      .bad{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:10}
      .text{font-family:Arial, Helvetica, sans-serif;font-size:16px;fill:#0f172a}
      .small{font-family:Arial, Helvetica, sans-serif;font-size:13px;fill:#475569}
      .line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .blocked{stroke:#b91c1c;stroke-width:3;stroke-dasharray:8 5;fill:none}
    </style>
  </defs>
  <rect x="35" y="45" width="150" height="70" class="box"/>
  <text x="110" y="75" text-anchor="middle" class="text">Caller Code</text>
  <text x="110" y="97" text-anchor="middle" class="small">wants change</text>
  <path d="M185 80 H278" class="line"/>
  <rect x="280" y="45" width="170" height="70" class="good"/>
  <text x="365" y="75" text-anchor="middle" class="text">Public Method</text>
  <text x="365" y="97" text-anchor="middle" class="small">deposit, withdraw</text>
  <path d="M450 80 H542" class="line"/>
  <rect x="545" y="45" width="190" height="70" class="box"/>
  <text x="640" y="75" text-anchor="middle" class="text">Validation Rules</text>
  <text x="640" y="97" text-anchor="middle" class="small">positive amount, balance</text>
  <path d="M640 115 V153" class="line"/>
  <rect x="545" y="155" width="190" height="70" class="good"/>
  <text x="640" y="185" text-anchor="middle" class="text">Private State</text>
  <text x="640" y="207" text-anchor="middle" class="small">balance safely updated</text>
  <path d="M110 115 C110 205 285 205 510 190" class="blocked"/>
  <text x="235" y="226" text-anchor="middle" class="small">direct field access is blocked</text>
</svg>

