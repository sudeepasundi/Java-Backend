<svg xmlns="http://www.w3.org/2000/svg" width="760" height="330" viewBox="0 0 760 330" role="img" aria-labelledby="title desc">
  <title id="title">Stack and heap memory</title>
  <desc id="desc">Diagram showing a stack frame containing a reference pointing to a User object on the heap.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.accent{fill:#fef3c7;stroke:#b45309;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:16px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:13px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="45" y="35" width="260" height="260" class="box"/><text x="175" y="65" text-anchor="middle" class="text">Thread Stack</text>
  <rect x="80" y="105" width="190" height="70" class="accent"/><text x="175" y="134" text-anchor="middle" class="text">registerUser()</text><text x="175" y="157" text-anchor="middle" class="small">user reference</text>
  <rect x="455" y="35" width="260" height="260" class="box"/><text x="585" y="65" text-anchor="middle" class="text">Heap</text>
  <rect x="500" y="120" width="170" height="90" class="accent"/><text x="585" y="150" text-anchor="middle" class="text">User object</text><text x="585" y="175" text-anchor="middle" class="small">email field</text>
  <path d="M270 140 C350 140 400 165 500 165" class="line"/>
</svg>

