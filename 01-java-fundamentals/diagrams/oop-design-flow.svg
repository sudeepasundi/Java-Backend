<svg xmlns="http://www.w3.org/2000/svg" width="980" height="300" viewBox="0 0 980 300" role="img" aria-labelledby="title desc">
  <title id="title">Object-oriented design flow</title>
  <desc id="desc">Flowchart showing problem domain to entities, classes, encapsulation, interfaces, and services.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <style>
      .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}
      .accent{fill:#fef3c7;stroke:#b45309;stroke-width:2;rx:10}
      .text{font-family:Arial, Helvetica, sans-serif;font-size:16px;fill:#0f172a}
      .small{font-family:Arial, Helvetica, sans-serif;font-size:13px;fill:#475569}
      .line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect x="30" y="95" width="135" height="80" class="accent"/>
  <text x="97" y="126" text-anchor="middle" class="text">Problem</text>
  <text x="97" y="150" text-anchor="middle" class="small">banking, orders</text>
  <path d="M165 135 H213" class="line"/>
  <rect x="215" y="95" width="135" height="80" class="box"/>
  <text x="282" y="126" text-anchor="middle" class="text">Entities</text>
  <text x="282" y="150" text-anchor="middle" class="small">Account, User</text>
  <path d="M350 135 H398" class="line"/>
  <rect x="400" y="95" width="135" height="80" class="box"/>
  <text x="467" y="126" text-anchor="middle" class="text">Classes</text>
  <text x="467" y="150" text-anchor="middle" class="small">data + behavior</text>
  <path d="M535 135 H583" class="line"/>
  <rect x="585" y="95" width="145" height="80" class="box"/>
  <text x="657" y="126" text-anchor="middle" class="text">Rules</text>
  <text x="657" y="150" text-anchor="middle" class="small">encapsulation</text>
  <path d="M730 135 H778" class="line"/>
  <rect x="780" y="95" width="160" height="80" class="accent"/>
  <text x="860" y="126" text-anchor="middle" class="text">Abstractions</text>
  <text x="860" y="150" text-anchor="middle" class="small">interfaces, services</text>
  <path d="M282 175 V230 H860 V175" class="line"/>
  <text x="570" y="255" text-anchor="middle" class="small">Refine the design when rules change or code becomes hard to test</text>
</svg>
