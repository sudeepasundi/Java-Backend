<svg xmlns="http://www.w3.org/2000/svg" width="920" height="240" viewBox="0 0 920 240" role="img" aria-labelledby="title desc">
  <title id="title">Dependency injection flow</title>
  <desc id="desc">Flowchart showing Spring discovering beans, creating dependencies, calling constructor, and returning ready service.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.accent{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:14px;fill:#0f172a}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="25" y="85" width="135" height="60" class="accent"/><text x="92" y="121" text-anchor="middle" class="text">Scan Classes</text>
  <path d="M160 115 H210" class="line"/><rect x="215" y="85" width="135" height="60" class="box"/><text x="282" y="121" text-anchor="middle" class="text">Find Beans</text>
  <path d="M350 115 H400" class="line"/><rect x="405" y="85" width="135" height="60" class="box"/><text x="472" y="121" text-anchor="middle" class="text">Create Dependencies</text>
  <path d="M540 115 H590" class="line"/><rect x="595" y="85" width="135" height="60" class="box"/><text x="662" y="121" text-anchor="middle" class="text">Call Constructor</text>
  <path d="M730 115 H780" class="line"/><rect x="785" y="85" width="110" height="60" class="accent"/><text x="840" y="121" text-anchor="middle" class="text">Ready Bean</text>
</svg>

