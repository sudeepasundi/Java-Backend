<svg xmlns="http://www.w3.org/2000/svg" width="930" height="260" viewBox="0 0 930 260" role="img" aria-labelledby="title desc">
  <title id="title">Spring MVC error handling flow</title>
  <desc id="desc">Flowchart showing controller or service throwing exception, controller advice catching it, and returning error response.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.warn{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:10}.good{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:14px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:12px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="35" y="95" width="130" height="65" class="box"/><text x="100" y="123" text-anchor="middle" class="text">Controller</text><text x="100" y="144" text-anchor="middle" class="small">calls service</text>
  <path d="M165 128 H240" class="line"/><rect x="245" y="95" width="130" height="65" class="warn"/><text x="310" y="123" text-anchor="middle" class="text">Exception</text><text x="310" y="144" text-anchor="middle" class="small">not found</text>
  <path d="M375 128 H450" class="line"/><rect x="455" y="95" width="170" height="65" class="good"/><text x="540" y="123" text-anchor="middle" class="text">@RestControllerAdvice</text><text x="540" y="144" text-anchor="middle" class="small">handles exception</text>
  <path d="M625 128 H700" class="line"/><rect x="705" y="95" width="170" height="65" class="box"/><text x="790" y="123" text-anchor="middle" class="text">Error Response</text><text x="790" y="144" text-anchor="middle" class="small">status + body</text>
</svg>

