<svg xmlns="http://www.w3.org/2000/svg" width="900" height="310" viewBox="0 0 900 310" role="img" aria-labelledby="title desc">
  <title id="title">Integration design flow</title>
  <desc id="desc">Decision flow for integrating an external system with Spring.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.decision{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.good{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:14px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:12px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="350" y="20" width="200" height="55" class="box"/><text x="450" y="53" text-anchor="middle" class="text">Need external system?</text>
  <path d="M450 75 V110" class="line"/><polygon points="450,110 590,170 450,230 310,170" class="decision"/><text x="450" y="166" text-anchor="middle" class="text">Can annotate class?</text><text x="450" y="187" text-anchor="middle" class="small">your code or library?</text>
  <path d="M310 170 H175" class="line"/><rect x="35" y="140" width="135" height="60" class="good"/><text x="102" y="165" text-anchor="middle" class="text">@Component</text><text x="102" y="186" text-anchor="middle" class="small">your class</text>
  <path d="M590 170 H725" class="line"/><rect x="730" y="140" width="135" height="60" class="good"/><text x="797" y="165" text-anchor="middle" class="text">@Bean</text><text x="797" y="186" text-anchor="middle" class="small">third-party</text>
  <path d="M450 230 V270" class="line"/><rect x="345" y="270" width="210" height="35" class="box"/><text x="450" y="293" text-anchor="middle" class="text">Inject through interface when useful</text>
</svg>

