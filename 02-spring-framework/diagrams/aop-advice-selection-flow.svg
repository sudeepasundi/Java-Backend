<svg xmlns="http://www.w3.org/2000/svg" width="960" height="330" viewBox="0 0 960 330" role="img" aria-labelledby="title desc">
  <title id="title">AOP advice selection flow</title>
  <desc id="desc">Flowchart for selecting before, after returning, after throwing, after, or around advice.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.decision{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.good{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:13px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:11px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="390" y="20" width="180" height="55" class="box"/><text x="480" y="53" text-anchor="middle" class="text">Need advice?</text>
  <path d="M480 75 V110" class="line"/><polygon points="480,110 620,165 480,220 340,165" class="decision"/><text x="480" y="161" text-anchor="middle" class="text">Control method call?</text>
  <path d="M620 165 H770" class="line"/><rect x="775" y="135" width="120" height="60" class="good"/><text x="835" y="162" text-anchor="middle" class="text">@Around</text><text x="835" y="183" text-anchor="middle" class="small">timing/retry</text>
  <path d="M480 220 V260" class="line"/><rect x="410" y="260" width="140" height="55" class="good"/><text x="480" y="284" text-anchor="middle" class="text">@Before</text><text x="480" y="303" text-anchor="middle" class="small">run first</text>
  <path d="M340 165 H190" class="line"/><rect x="55" y="135" width="130" height="60" class="good"/><text x="120" y="155" text-anchor="middle" class="text">@AfterReturning</text><text x="120" y="176" text-anchor="middle" class="small">success only</text>
  <path d="M480 110 C390 75 275 75 190 120" class="line"/><rect x="55" y="35" width="130" height="55" class="good"/><text x="120" y="58" text-anchor="middle" class="text">@AfterThrowing</text><text x="120" y="77" text-anchor="middle" class="small">failure only</text>
</svg>

