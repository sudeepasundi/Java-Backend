<svg xmlns="http://www.w3.org/2000/svg" width="920" height="280" viewBox="0 0 920 280" role="img" aria-labelledby="title desc">
  <title id="title">Transaction flow</title>
  <desc id="desc">Flowchart showing transaction start, method execution, success commit, and exception rollback.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.decision{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.good{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:10}.warn{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:14px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:12px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="40" y="105" width="135" height="65" class="good"/><text x="107" y="133" text-anchor="middle" class="text">Start</text><text x="107" y="154" text-anchor="middle" class="small">transaction</text>
  <path d="M175 138 H255" class="line"/><rect x="260" y="105" width="145" height="65" class="box"/><text x="332" y="133" text-anchor="middle" class="text">Call Method</text><text x="332" y="154" text-anchor="middle" class="small">@Transactional</text>
  <path d="M405 138 H485" class="line"/><polygon points="565,85 680,138 565,190 450,138" class="decision"/><text x="565" y="134" text-anchor="middle" class="text">Exception?</text>
  <path d="M680 138 H760" class="line"/><rect x="765" y="108" width="120" height="60" class="warn"/><text x="825" y="133" text-anchor="middle" class="text">Rollback</text><text x="825" y="154" text-anchor="middle" class="small">undo changes</text>
  <path d="M565 190 V230 H765" class="line"/><rect x="765" y="210" width="120" height="55" class="good"/><text x="825" y="242" text-anchor="middle" class="text">Commit</text>
</svg>
