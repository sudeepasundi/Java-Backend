<svg xmlns="http://www.w3.org/2000/svg" width="920" height="250" viewBox="0 0 920 250" role="img" aria-labelledby="title desc">
  <title id="title">Actuator flow</title>
  <desc id="desc">Flowchart showing operations tools calling Actuator endpoints to inspect health, metrics, info, and logs.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.accent{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2;rx:10}.warn{fill:#fef3c7;stroke:#b45309;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:14px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:12px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="35" y="95" width="130" height="65" class="box"/><text x="100" y="122" text-anchor="middle" class="text">Ops Tool</text><text x="100" y="143" text-anchor="middle" class="small">monitoring</text>
  <path d="M165 128 H235" class="line"/><rect x="240" y="95" width="150" height="65" class="accent"/><text x="315" y="122" text-anchor="middle" class="text">Actuator</text><text x="315" y="143" text-anchor="middle" class="small">management API</text>
  <path d="M390 128 H460" class="line"/><rect x="465" y="45" width="130" height="50" class="warn"/><text x="530" y="75" text-anchor="middle" class="text">Health</text>
  <rect x="465" y="105" width="130" height="50" class="warn"/><text x="530" y="135" text-anchor="middle" class="text">Metrics</text>
  <rect x="465" y="165" width="130" height="50" class="warn"/><text x="530" y="195" text-anchor="middle" class="text">Info</text>
  <path d="M595 128 H670" class="line"/><rect x="675" y="95" width="190" height="65" class="accent"/><text x="770" y="122" text-anchor="middle" class="text">Production Insight</text><text x="770" y="143" text-anchor="middle" class="small">is app healthy?</text>
</svg>

