<svg xmlns="http://www.w3.org/2000/svg" width="980" height="330" viewBox="0 0 980 330" role="img" aria-labelledby="title desc">
  <title id="title">Traditional Spring versus Spring Boot</title>
  <desc id="desc">Diagram comparing manual setup in traditional Spring with starter and auto-configuration setup in Spring Boot.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.warn{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:10}.good{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:15px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:12px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <text x="245" y="35" text-anchor="middle" class="text">Traditional Spring</text>
  <rect x="35" y="70" width="150" height="60" class="warn"/><text x="110" y="96" text-anchor="middle" class="text">Pick versions</text>
  <path d="M185 100 H235" class="line"/><rect x="240" y="70" width="150" height="60" class="warn"/><text x="315" y="96" text-anchor="middle" class="text">Configure MVC</text>
  <path d="M390 100 H440" class="line"/><rect x="445" y="70" width="150" height="60" class="warn"/><text x="520" y="96" text-anchor="middle" class="text">Deploy WAR</text>
  <text x="735" y="35" text-anchor="middle" class="text">Spring Boot</text>
  <rect x="620" y="70" width="140" height="60" class="good"/><text x="690" y="96" text-anchor="middle" class="text">Add starter</text>
  <path d="M760 100 H810" class="line"/><rect x="815" y="70" width="140" height="60" class="good"/><text x="885" y="96" text-anchor="middle" class="text">Run JAR</text>
  <rect x="620" y="180" width="335" height="80" class="box"/><text x="787" y="210" text-anchor="middle" class="text">Boot fills common setup</text><text x="787" y="235" text-anchor="middle" class="small">MVC, JSON, logging, embedded server, defaults</text>
</svg>

