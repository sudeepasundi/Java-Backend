<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400" role="img" aria-labelledby="title desc">
  <title id="title">Status code selection flow</title>
  <desc id="desc">Decision flowchart for choosing success, client error, or server error status codes.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.decision{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.good{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:10}.warn{fill:#fef3c7;stroke:#b45309;stroke-width:2;rx:10}.bad{fill:#fee2e2;stroke:#b91c1c;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:13px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:11px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="380" y="20" width="200" height="55" class="box"/><text x="480" y="53" text-anchor="middle" class="text">Request processed?</text>
  <path d="M480 75 V110" class="line"/><polygon points="480,110 620,165 480,220 340,165" class="decision"/><text x="480" y="161" text-anchor="middle" class="text">Successful?</text>
  <path d="M340 165 H190" class="line"/><rect x="55" y="135" width="130" height="60" class="good"/><text x="120" y="160" text-anchor="middle" class="text">2xx</text><text x="120" y="181" text-anchor="middle" class="small">200, 201, 204</text>
  <path d="M620 165 H770" class="line"/><polygon points="830,115 925,165 830,215 735,165" class="decision"/><text x="830" y="161" text-anchor="middle" class="text">Client issue?</text>
  <path d="M830 215 V275" class="line"/><rect x="765" y="280" width="130" height="60" class="bad"/><text x="830" y="305" text-anchor="middle" class="text">5xx</text><text x="830" y="326" text-anchor="middle" class="small">server failed</text>
  <path d="M735 165 H610 V300 H455" class="line"/><rect x="320" y="270" width="130" height="60" class="warn"/><text x="385" y="295" text-anchor="middle" class="text">4xx</text><text x="385" y="316" text-anchor="middle" class="small">400, 404, 409</text>
</svg>

