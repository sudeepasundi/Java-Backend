<svg xmlns="http://www.w3.org/2000/svg" width="920" height="260" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">Pagination flow</title>
  <desc id="desc">Flowchart showing client requesting page and size, API querying limited data, and returning items with metadata.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.accent{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:14px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:12px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="35" y="95" width="130" height="65" class="box"/><text x="100" y="122" text-anchor="middle" class="text">Client</text><text x="100" y="143" text-anchor="middle" class="small">page=0 size=20</text>
  <path d="M165 128 H240" class="line"/><rect x="245" y="95" width="130" height="65" class="accent"/><text x="310" y="122" text-anchor="middle" class="text">API</text><text x="310" y="143" text-anchor="middle" class="small">validate params</text>
  <path d="M375 128 H450" class="line"/><rect x="455" y="95" width="140" height="65" class="box"/><text x="525" y="122" text-anchor="middle" class="text">Data Store</text><text x="525" y="143" text-anchor="middle" class="small">limit + offset</text>
  <path d="M595 128 H670" class="line"/><rect x="675" y="95" width="200" height="65" class="accent"/><text x="775" y="122" text-anchor="middle" class="text">Items + Metadata</text><text x="775" y="143" text-anchor="middle" class="small">total, page, size</text>
</svg>
