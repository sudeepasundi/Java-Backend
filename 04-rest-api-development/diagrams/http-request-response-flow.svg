<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" viewBox="0 0 900 240" role="img" aria-labelledby="title desc">
  <title id="title">HTTP request response flow</title>
  <desc id="desc">Diagram showing client sending HTTP request to REST API and receiving HTTP response.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.accent{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:16px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:12px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="55" y="80" width="150" height="75" class="accent"/><text x="130" y="111" text-anchor="middle" class="text">Client</text><text x="130" y="135" text-anchor="middle" class="small">web/mobile/service</text>
  <path d="M205 100 H685" class="line"/><text x="445" y="85" text-anchor="middle" class="small">HTTP request: method + URL + headers + body</text>
  <rect x="695" y="80" width="150" height="75" class="accent"/><text x="770" y="111" text-anchor="middle" class="text">REST API</text><text x="770" y="135" text-anchor="middle" class="small">Spring backend</text>
  <path d="M695 140 H215" class="line"/><text x="455" y="170" text-anchor="middle" class="small">HTTP response: status + headers + body</text>
</svg>

