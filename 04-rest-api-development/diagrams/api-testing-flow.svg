<svg xmlns="http://www.w3.org/2000/svg" width="920" height="250" viewBox="0 0 920 250" role="img" aria-labelledby="title desc">
  <title id="title">API testing flow</title>
  <desc id="desc">Flowchart showing test request through MockMvc to controller, mocked service, response assertions, and contract protection.</desc>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker></defs>
  <style>.box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}.accent{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:10}.text{font-family:Arial, Helvetica, sans-serif;font-size:14px;fill:#0f172a}.small{font-family:Arial, Helvetica, sans-serif;font-size:12px;fill:#475569}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}</style>
  <rect x="35" y="95" width="130" height="65" class="accent"/><text x="100" y="122" text-anchor="middle" class="text">Test</text><text x="100" y="143" text-anchor="middle" class="small">MockMvc request</text>
  <path d="M165 128 H240" class="line"/><rect x="245" y="95" width="130" height="65" class="box"/><text x="310" y="122" text-anchor="middle" class="text">Controller</text><text x="310" y="143" text-anchor="middle" class="small">API layer</text>
  <path d="M375 128 H450" class="line"/><rect x="455" y="95" width="130" height="65" class="box"/><text x="520" y="122" text-anchor="middle" class="text">Mock Service</text><text x="520" y="143" text-anchor="middle" class="small">controlled result</text>
  <path d="M585 128 H660" class="line"/><rect x="665" y="95" width="190" height="65" class="accent"/><text x="760" y="122" text-anchor="middle" class="text">Assert Contract</text><text x="760" y="143" text-anchor="middle" class="small">status + JSON shape</text>
</svg>
